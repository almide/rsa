name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Almide
        run: |
          curl -fsSL https://raw.githubusercontent.com/almide/almide/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check
        run: almide check

      - name: Test
        run: almide test

      - name: Build
        run: almide build
